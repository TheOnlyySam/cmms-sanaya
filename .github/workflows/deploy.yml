name: Deploy To DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            DEPLOY_PATH="${{ vars.DEPLOY_PATH || '/opt/atlas-cmms' }}"
            ENV_FILE="${{ vars.DEPLOY_ENV_FILE || '.env.production' }}"

            cd "$DEPLOY_PATH"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            docker compose --env-file "$ENV_FILE" -f docker-compose.yml -f docker-compose.production.yml up -d --build --remove-orphans
